name: Deploy

# Auto-deploy to the production VM on every push to main, and on demand.
# Builds happen on the server (single-VM docker compose), so this job just
# triggers a pull + rebuild over SSH.
#
# Required repository secrets:
#   DEPLOY_HOST     - VM public IP or hostname
#   DEPLOY_USER     - SSH user (e.g. ubuntu)
#   DEPLOY_SSH_KEY  - private key whose public half is in the VM's authorized_keys
#   DEPLOY_PATH     - absolute path to the checked-out repo on the VM

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --all
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
            docker image prune -f

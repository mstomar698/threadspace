name: Feature request
description: Suggest an idea or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem would this solve? Who is it for?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend (API / Django)
        - Frontend (Next.js)
        - Realtime gateway (Rust)
        - Infra / Docker
        - Other
    validations:
      required: true
